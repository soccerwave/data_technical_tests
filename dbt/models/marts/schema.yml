version: 2

models:
  - name: fct_visits
    description: "Fact table with one row per unique visit_id."
    columns:
      - name: visit_id
        description: "Unique visit identifier."
        tests:
          - not_null
          - unique

      - name: campaign_id
        description: "Campaign linked to the visit."
        tests:
          - relationships:
              arguments:
                to: ref('dim_campaigns')
                field: campaign_id

      - name: intervention_point_id
        description: "Intervention point / POS linked to the visit."
        tests:
          - relationships:
              arguments:
                to: ref('dim_pos')
                field: intervention_point_id

      - name: route_id
        description: "Route linked to the visit. Some route_ids are known to be missing from raw_routes."
        tests:
          - relationships:
              arguments:
                to: ref('dim_routes')
                field: route_id
              config:
                severity: warn

      - name: has_missing_route_reference
        description: "Flags visits where route_id is present but does not exist in dim_routes."

  - name: fct_responses
    description: "Fact table with one row per response/answer."
    columns:
      - name: answer_id
        description: "Unique response identifier."
        tests:
          - not_null
          - unique

      - name: visit_id
        description: "Visit linked to the response."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('fct_visits')
                field: visit_id

      - name: question_id
        description: "Question linked to the response. Some values may be null in the raw data."
        tests:
          - relationships:
              arguments:
                to: ref('dim_questions')
                field: question_id

      - name: is_expected_answer
        description: "Flags whether the answer matches the expected answer. Null is kept when answer or expected_answer is missing."

  - name: dim_campaigns
    description: "Campaign dimension. Includes parsed campaign dates, business status fields, planned visit metrics, and a flag for invalid date ranges."
    columns:
      - name: campaign_id
        description: "Unique campaign identifier."
        tests:
          - not_null
          - unique

      - name: project_id
        description: "Project linked to the campaign."
        tests:
          - relationships:
              arguments:
                to: ref('dim_projects')
                field: project_id

      - name: campaign_state
        description: "Current business state of the campaign."

      - name: is_active
        description: "Indicates whether the campaign is active."

      - name: total_visits_planned
        description: "Number of visits planned for the campaign."

      - name: total_pos_planned
        description: "Number of intervention points planned for the campaign."

      - name: visit_duration_minutes
        description: "Planned visit duration in minutes."

      - name: has_invalid_date_range
        description: "Flags campaigns where campaign_end_date is earlier than campaign_start_date."

  - name: dim_clients
    description: "Client dimension, deduplicated by client_id."
    columns:
      - name: client_id
        description: "Unique client identifier."
        tests:
          - not_null
          - unique

  - name: dim_projects
    description: "Project dimension, deduplicated by project_id."
    columns:
      - name: project_id
        description: "Unique project identifier."
        tests:
          - not_null
          - unique

      - name: client_id
        description: "Client linked to the project."
        tests:
          - relationships:
              arguments:
                to: ref('dim_clients')
                field: client_id

  - name: dim_pos
    description: "Intervention point / POS dimension."
    columns:
      - name: intervention_point_id
        description: "Unique intervention point identifier."
        tests:
          - not_null
          - unique

  - name: dim_routes
    description: "Route dimension, deduplicated by route_id."
    columns:
      - name: route_id
        description: "Unique route identifier."
        tests:
          - not_null
          - unique

      - name: campaign_id
        description: "Campaign linked to the route."
        tests:
          - relationships:
              arguments:
                to: ref('dim_campaigns')
                field: campaign_id

  - name: dim_questions
    description: "Question dimension, deduplicated by question_id."
    columns:
      - name: question_id
        description: "Unique question identifier."
        tests:
          - not_null
          - unique

      - name: campaign_id
        description: "Campaign linked to the question."
        tests:
          - relationships:
              arguments:
                to: ref('dim_campaigns')
                field: campaign_id

  - name: dim_workers
    description: "Worker dimension, deduplicated by employee_id."
    columns:
      - name: employee_id
        description: "Unique employee identifier."
        tests:
          - not_null
          - unique

  - name: bridge_route_employee
    description: "Bridge table linking routes and workers. Kept separate to avoid changing the grain of fct_visits."
    columns:
      - name: route_employee_id
        description: "Unique route-employee relationship identifier."
        tests:
          - not_null
          - unique

      - name: route_id
        description: "Route linked to the employee assignment."
        tests:
          - relationships:
              arguments:
                to: ref('dim_routes')
                field: route_id

      - name: employee_id
        description: "Employee linked to the route assignment."
        tests:
          - relationships:
              arguments:
                to: ref('dim_workers')
                field: employee_id